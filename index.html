<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>아기 나이 계산기👼🏻</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      background: #f5f5f7;
      margin: 0;
    }
    .card {
      background: #fff;
      padding: 24px 20px;
      border-radius: 24px;
      max-width: 520px;
      width: 100%;
      margin: 24px auto;
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }
    h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 28px;
      line-height: 1.25;
    }
    input {
      width: 100%;
      display: block;
      padding: 16px 18px;
      margin-top: 10px;
      font-size: 18px;
      border-radius: 18px;
      border: 1.5px solid #e5e7eb;
      background: #ffffff;
      color: #111827;
      box-sizing: border-box;
      appearance: none;
      -webkit-appearance: none;
      box-shadow: 0 2px 8px rgba(17,24,39,0.04);
    }
    input:focus {
      outline: none;
      border-color: #cbd5e1;
      box-shadow: 0 0 0 4px rgba(148,163,184,0.12);
    }
    .result {
      margin-top: 28px;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.9;
    }
    @media (max-width: 480px) {
      body {
        padding: 16px;
      }
      .card {
        margin: 16px auto;
        padding: 22px 18px;
        border-radius: 22px;
      }
      h2 {
        font-size: 26px;
      }
      input {
        font-size: 17px;
        padding: 15px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>아기 나이 계산기 👼🏻</h2>

    <input type="date" id="birth" value="2026-02-04">

    <div class="result" id="result"></div>
  </div>

<script>
function startOfDay(d){
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}

function daysBetween(a,b){
  return Math.floor((startOfDay(b)-startOfDay(a)) / 86400000);
}

function addMonths(date, months){
  const d = new Date(date);
  const original = d.getDate();
  d.setMonth(d.getMonth() + months);
  if (d.getDate() < original) d.setDate(0);
  return d;
}

function calc(){
  const birthValue = document.getElementById('birth').value;
  const result = document.getElementById('result');

  if (!birthValue) {
    result.innerHTML = '출생일을 입력해주세요.';
    return;
  }

  const birth = new Date(birthValue);
  const today = new Date();

  if (startOfDay(birth) > startOfDay(today)) {
    result.innerHTML = '출생일이 오늘보다 미래일 수는 없어요.';
    return;
  }

  const totalDays = daysBetween(birth, today);

  const weeks = Math.floor(totalDays / 7);
  const weekDays = totalDays % 7;
  const weekLabel = weeks + '주차';

  let months = (today.getFullYear() - birth.getFullYear()) * 12
             + (today.getMonth() - birth.getMonth());

  let anchor = addMonths(birth, months);
  if (startOfDay(anchor) > startOfDay(today)){
    months--;
    anchor = addMonths(birth, months);
  }

  const monthDays = daysBetween(anchor, today);

  localStorage.setItem('babyBirthDate', birthValue);

  result.innerHTML =
    `생후 ${totalDays}일<br>
     ${weeks}주 ${weekDays}일 (${weekLabel})<br>
     ${months}개월 ${monthDays}일`;
}

const savedBirthDate = localStorage.getItem('babyBirthDate');
if (savedBirthDate) {
  document.getElementById('birth').value = savedBirthDate;
}

document.getElementById('birth').addEventListener('change', calc);
calc();
</script>
</body>
</html>
